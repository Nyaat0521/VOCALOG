<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOCALOG</title>
<link rel="stylesheet" href="style.css">
<script>
(function(){
  const saved = localStorage.getItem("theme");
  if(saved){
    document.documentElement.setAttribute("data-theme", saved);
  }
})();
</script>
</head>
<body>

<header>
  <h1>VOCALOG</h1>
  <button id="themeToggle">🌙</button>
</header>

<main>
  <input type="text" placeholder="曲名 / ボカロP / ボカロ / タグで検索">

  <!-- ショートカット説明文は完全削除済み -->

  <div class="song-card">
    <h2 class="song-title">
      生きる
      <span class="reading">（いきる）</span>
      <span class="badge">今週</span>
    </h2>
    <p>水野あつ / 可不 (KAFU)</p>
    <p>公開：2021-07-22</p>
  </div>
</main>

<script src="theme.js"></script>
</body>
</html>
