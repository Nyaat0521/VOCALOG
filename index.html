<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOCALOG</title>
<link rel="stylesheet" href="style.css">
<script>
(function(){
  const saved = localStorage.getItem("theme");
  if(saved){
    document.documentElement.setAttribute("data-theme", saved);
  }
})();
</script>
</head>
<body>

<header class="header">
  <h1>VOCALOG</h1>
  <button id="themeToggle">🌙</button>
</header>

<main class="container">

<input class="search" type="text" placeholder="曲名 / ボカロP / ボカロで検索">

<div class="card">
  <h2 class="title">
    生きる
    <span class="reading">（いきる）</span>
    <span class="badge">今週</span>
  </h2>
  <p class="meta">水野あつ / 可不</p>
  <div class="tags">
    <span class="tag">ロック</span>
    <span class="tag">エモい</span>
    <span class="tag more">+3</span>
  </div>
</div>

</main>

<script src="theme.js"></script>
</body>
</html>
